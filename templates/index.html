<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mindful Journal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; margin-top: 0; margin-bottom: 25px; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        .results-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            display: none;
        }
        .tag {
            display: inline-block;
            background-color: #e1f5fe;
            color: #0288d1;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            margin-right: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mindful ML Journal</h1>
    <p class="subtitle">Write your thoughts and let NLP analyze your emotional vibe.</p>
    
    <textarea id="journalEntry" placeholder="How was your day? Pour your heart out..."></textarea>
    <button onclick="analyzeEntry()">Analyze Vibe 🧠</button>

    <div id="results" class="results-box">
        <h3>Analysis Results:</h3>
        <p><strong>Vibe Check:</strong> <span id="moodResult"></span></p>
        <p><strong>Sentiment Score:</strong> <span id="scoreResult"></span></p>
        <div id="tagsContainer"></div>
    </div>
</div>

<script>
    async function analyzeEntry() {
        const text = document.getElementById('journalEntry').value;
        if (!text.trim()) return alert("Write something first, bud!");

        // Connect to our Flask API endpoint
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            document: JSON.stringify({ entry: text })
        });

        const data = await response.json();

        // Update the interface dynamically with ML results
        document.getElementById('results').style.display = 'block';
        document.getElementById('moodResult').innerText = data.mood;
        document.getElementById('scoreResult').innerText = data.score;

        // Clear and render the extracted keyword tags
        const tagsContainer = document.getElementById('tagsContainer');
        tagsContainer.innerHTML = '<strong>Key Topics:</strong><br>';
        if (data.tags.length === 0) {
            tagsContainer.innerHTML += '<span class="tag">No major tags found</span>';
        } else {
            data.tags.forEach(tag => {
                tagsContainer.innerHTML += `<span class="tag">${tag}</span>`;
            });
        }
    }
</script>
</body>
</html>
