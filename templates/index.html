<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflection Space</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfbfa;
            color: #2d2a29;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-card {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #eae6e1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            box-sizing: border-box;
        }
        h1 { font-weight: 600; font-size: 28px; color: #1a1817; margin-bottom: 8px; }
        .subtitle { color: #8a8480; font-size: 15px; margin-top: 0; margin-bottom: 30px; }
        textarea {
            width: 100%;
            height: 180px;
            padding: 16px;
            border: 1px solid #e2ded9;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            background: #fafaf9;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus { border-color: #a39e93; background: #ffffff; }
        button {
            background-color: #2d2a29;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background-color: #4a4644; }
        .insight-section {
            margin-top: 35px;
            display: none;
            border-top: 1px solid #eae6e1;
            padding-top: 25px;
        }
        .vibe-badge {
            display: inline-block;
            background: #f1f0ec;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            color: #4a4644;
        }
        .coach-bubble {
            background: #f7f5f0;
            border-radius: 12px;
            padding: 18px;
            margin-top: 15px;
            border-left: 4px solid #8c857b;
            font-style: italic;
            line-height: 1.5;
        }
        .highlight-chip {
            margin-top: 15px;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            background: #fcfcfc;
            border: 1px dashed #e2ded9;
        }
        .tag {
            display: inline-block;
            background-color: #f1f0ec;
            color: #615c57;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-right: 6px;
            margin-top: 6px;
        }
        .history-section {
            max-width: 650px;
            width: 100%;
            margin-top: 40px;
        }
        .history-title { font-weight: 600; font-size: 20px; color: #1a1817; margin-bottom: 15px; }
        .chart-container {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eae6e1;
            margin-bottom: 25px;
        }
        .history-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eae6e1;
            margin-bottom: 15px;
        }
        .history-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8a8480;
            margin-bottom: 10px;
        }
        .history-text { font-size: 15px; line-height: 1.5; color: #2d2a29; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>Reflection Space</h1>
    <p class="subtitle">A mindful space designed to process your internal landscape.</p>
    
    <textarea id="journalText" placeholder="Start typing your thoughts freely..."></textarea>
    <button onclick="processReflection()">Reflect & Deepen 🌿</button>

    <div id="insightPanel" class="insight-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="vibe-badge" id="vibeLabel">Analyzing...</span>
            <span style="font-size: 13px; color: #8a8480;">Metric Score: <span id="metricLabel">0.0</span></span>
        </div>
        
        <div class="coach-bubble">
            <strong style="font-style: normal; display: block; margin-bottom: 4px; color: #1a1817;">AI Guided Clarity Prompt:</strong>
            <span id="promptLabel">...</span>
        </div>

        <div id="highlightBox" class="highlight-chip" style="display:none;"></div>
        <div id="lowlightBox" class="highlight-chip" style="display:none; border-color: #f2dede;"></div>

        <div id="topicsWrapper" style="margin-top: 20px;"></div>
    </div>
</div>

<div class="history-section">
    <div class="history-title">Vibe Analytics Dashboard</div>
    <div class="chart-container" id="chartWrapper" style="display: none;">
        <canvas id="moodChart"></canvas>
    </div>

    <div class="history-title">Past Reflections</div>
    <div id="historyFeed"></div>
</div>

<script>
    window.onload = loadHistory;
    let moodChartInstance = null; // Store chart globally so we can refresh it cleanly

    async function loadHistory() {
        const response = await fetch('/api/history');
        const entries = await response.json();
        const feed = document.getElementById('historyFeed');
        feed.innerHTML = '';

        if (entries.length === 0) {
            feed.innerHTML = '<p style="color: #8a8480; font-style: italic;">No past reflections yet. Write your first entry above!</p>';
            document.getElementById('chartWrapper').style.display = 'none';
            return;
        }

        // Render individual history items
        entries.forEach(entry => {
            let tagsHTML = entry.tags.map(t => t ? `<span class="tag">#${t}</span>` : '').join('');
            feed.innerHTML += `
                <div class="history-card">
                    <div class="history-meta">
                        <span>📅 ${entry.date}</span>
                        <span style="font-weight:600; color:#4a4644;">🧠 ${entry.mood} (${entry.score})</span>
                    </div>
                    <div class="history-text">${entry.text}</div>
                    <div style="margin-top: 10px;">${tagsHTML}</div>
                </div>
            `;
        });

        // 📊 RENDER CHART DATA (Reverse entries list so chronology moves left-to-right)
        document.getElementById('chartWrapper').style.display = 'block';
        const chartData = [...entries].reverse();
        const dates = chartData.map(e => e.date.substring(5, 16)); // Format timestamp slightly
        const scores = chartData.map(e => e.score);

        if (moodChartInstance) { moodChartInstance.destroy(); } // Clear old data pointer

        const ctx = document.getElementById('moodChart').getContext('2d');
        moodChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: 'Sentiment Trend',
                    data: scores,
                    borderColor: '#8c857b',
                    backgroundColor: 'rgba(140, 133, 123, 0.05)',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { min: -1, max: 1, grid: { color: '#eae6e1' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    async function processReflection() {
        const text = document.getElementById('journalText').value;
        if (!text.trim()) return alert("Your space is blank, bud! Write down some thoughts.");

        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ entry: text })
        });

        const data = await response.json();

        document.getElementById('insightPanel').style.display = 'block';
        document.getElementById('vibeLabel').innerText = data.mood;
        document.getElementById('metricLabel').innerText = data.score;
        document.getElementById('promptLabel').innerText = data.prompt;

        const hiBox = document.getElementById('highlightBox');
        if(data.highlight) {
            hiBox.style.display = 'block';
            hiBox.innerHTML = `☀️ <strong>Emotional High-point:</strong> "${data.highlight}"`;
        } else { hiBox.style.display = 'none'; }

        const loBox = document.getElementById('lowlightBox');
        if(data.lowlight) {
            loBox.style.display = 'block';
            loBox.innerHTML = `⛈️ <strong>Emotional Low-point:</strong> "${data.lowlight}"`;
        } else { loBox.style.display = 'none'; }

        const tagBox = document.getElementById('topicsWrapper');
        tagBox.innerHTML = '<strong style="font-size: 14px;">Focused Themes:</strong><br>';
        if(!data.tags || data.tags.length === 0) {
            tagBox.innerHTML += '<span class="tag">General Processing</span>';
        } else {
            data.tags.forEach(tag => {
                if(tag.trim()) tagBox.innerHTML += `<span class="tag">#${tag}</span>`;
            });
        }

        document.getElementById('journalText').value = '';
        loadHistory();
    }
</script>
</body>
</html>
