<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reflection Space</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfbfa;
            color: #2d2a29;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .app-card {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #eae6e1;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        h1 { font-weight: 600; font-size: 28px; color: #1a1817; margin-bottom: 8px; }
        .subtitle { color: #8a8480; font-size: 15px; margin-top: 0; margin-bottom: 30px; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            border: 1px solid #e2ded9;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            background: #fafaf9;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus { border-color: #a39e93; background: #ffffff; }
        button {
            background-color: #2d2a29;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background-color: #4a4644; }
        .insight-section {
            margin-top: 35px;
            display: none;
            border-top: 1px solid #eae6e1;
            padding-top: 25px;
        }
        .vibe-badge {
            display: inline-block;
            background: #f1f0ec;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            color: #4a4644;
        }
        .coach-bubble {
            background: #f7f5f0;
            border-radius: 12px;
            padding: 18px;
            margin-top: 15px;
            border-left: 4px solid #8c857b;
            font-style: italic;
            line-height: 1.5;
        }
        .highlight-chip {
            margin-top: 15px;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            background: #fcfcfc;
            border: 1px dashed #e2ded9;
        }
        .tag {
            display: inline-block;
            background-color: #f1f0ec;
            color: #615c57;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-right: 6px;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h1>Reflection Space</h1>
    <p class="subtitle">A mindful space designed to process your internal landscape.</p>
    
    <textarea id="journalText" placeholder="Start typing your thoughts freely..."></textarea>
    <button onclick="processReflection()">Reflect & Deepen 🌿</button>

    <div id="insightPanel" class="insight-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="vibe-badge" id="vibeLabel">Analyzing...</span>
            <span style="font-size: 13px; color: #8a8480;">Metric Score: <span id="metricLabel">0.0</span></span>
        </div>
        
        <div class="coach-bubble">
            <strong style="font-style: normal; display: block; margin-bottom: 4px; color: #1a1817;">AI Guided Clarity Prompt:</strong>
            <span id="promptLabel">...</span>
        </div>

        <div id="highlightBox" class="highlight-chip" style="display:none;"></div>
        <div id="lowlightBox" class="highlight-chip" style="display:none; border-color: #f2dede;"></div>

        <div id="topicsWrapper" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    async function processReflection() {
        const text = document.getElementById('journalText').value;
        if (!text.trim()) return alert("Your space is blank, bud! Write down some thoughts.");

        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ entry: text })
        });

        const data = await response.json();

        // Reveal panel and populate information cleanly
        document.getElementById('insightPanel').style.display = 'block';
        document.getElementById('vibeLabel').innerText = data.mood;
        document.getElementById('metricLabel').innerText = data.score;
        document.getElementById('promptLabel').innerText = data.prompt;

        // Display High/Low Sentence Targets
        const hiBox = document.getElementById('highlightBox');
        if(data.highlight) {
            hiBox.style.display = 'block';
            hiBox.innerHTML = `☀️ <strong>Emotional High-point:</strong> "${data.highlight}"`;
        } else { hiBox.style.display = 'none'; }

        const loBox = document.getElementById('lowlightBox');
        if(data.lowlight) {
            loBox.style.display = 'block';
            loBox.innerHTML = `⛈️ <strong>Emotional Low-point:</strong> "${data.lowlight}"`;
        } else { loBox.style.display = 'none'; }

        // Core Subject Tag Mapping
        const tagBox = document.getElementById('topicsWrapper');
        tagBox.innerHTML = '<strong style="font-size: 14px;">Focused Themes:</strong><br>';
        if(data.tags.length === 0) {
            tagBox.innerHTML += '<span class="tag">General Processing</span>';
        } else {
            data.tags.forEach(tag => {
                tagBox.innerHTML += `<span class="tag">#${tag}</span>`;
            });
        }
    }
</script>
</body>
</html>
